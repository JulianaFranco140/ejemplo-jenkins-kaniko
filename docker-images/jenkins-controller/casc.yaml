jenkins:
  systemMessage: "Welcome to Jenkins!"
  numExecutors: 0
  remotingSecurity:
    enabled: true
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: ${JENKINS_ADMIN_ID}
          password: ${JENKINS_ADMIN_PASSWORD}
  authorizationStrategy:
    globalMatrix:
      permissions:
        - "Overall/Administer:admin"
        - "Overall/Read:authenticated"
  clouds:
    - kubernetes:
        name: "kubernetes"
        skipTlsVerify: true
        jenkinsUrl: "http://jenkins-service:8080"
        jenkinsTunnel: "jenkins-service:50000"
        templates:
          - name: "jenkins-agent"
            label: "jenkins-agent"
            serviceAccount: "jenkins"
            imagePullSecrets:
              - name: regcred
            volumes:
              - secretVolume:
                  mountPath: /kaniko/.docker
                  secretName: regcred
            containers:
              - name: jnlp
                image: "julianafranco140/jenkins-jnlp-kaniko"
                alwaysPullImage: true
                workingDir: "/home/jenkins/agent"
                command: ""
                args: ""

unclassified:
  location:
    url: http://127.0.0.1:8080/